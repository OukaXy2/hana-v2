<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Live2D - Huohuo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; }
  #status {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    color: white; font-family: sans-serif; font-size: 13px;
    background: rgba(255,255,255,0.1); padding: 6px 16px;
    border-radius: 99px; z-index: 10; white-space: nowrap;
    transition: opacity 0.5s;
  }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 12px;
    text-align: center; z-index: 10;
  }
  canvas { display: block; }
</style>
</head>
<body>

<div id="status">⏳ Memuat model...</div>
<div id="hint">Tap atas = gerak kepala · Tap bawah = animasi badan</div>
<canvas id="canvas"></canvas>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const STATUS = document.getElementById('status');
const W = window.innerWidth;
const H = window.innerHeight;

const app = new PIXI.Application({
  view: document.getElementById('canvas'),
  width: W, height: H,
  backgroundColor: 0x1a1a2e,
});

const MODEL_URL = 'https://oukaxy2.github.io/hana-v2/huohuo.model3.json';
let model = null;
let isPlaying = false;

async function load() {
  try {
    STATUS.textContent = '⏳ Memuat Huohuo...';
    const Live2DModel = PIXI.live2d.Live2DModel;
    model = await Live2DModel.from(MODEL_URL);
    app.stage.addChild(model);

    const scale = Math.min(W / model.width, H / model.height) * 0.92;
    model.scale.set(scale);
    model.x = (W - model.width) / 2;
    model.y = (H - model.height) / 2;

    STATUS.textContent = '✅ Huohuo siap!';
    setTimeout(() => STATUS.style.opacity = '0', 2000);

    // Auto idle
    model.motion('Idle');

  } catch(e) {
    STATUS.textContent = '❌ Gagal: ' + e.message;
    console.error(e);
  }
}

async function triggerMotion(type) {
  if (!model || isPlaying) return;
  isPlaying = true;
  await model.motion(type);
  // tunggu motion selesai baru boleh trigger lagi
  setTimeout(() => {
    isPlaying = false;
    model.motion('Idle');
  }, 3000);
}

document.addEventListener('click', (e) => {
  if (!model) return;
  if (e.clientY < H / 2) {
    triggerMotion('TapHead');
  } else {
    triggerMotion('TapBody');
  }
});

document.addEventListener('touchend', (e) => {
  if (!model) return;
  const touch = e.changedTouches[0];
  if (touch.clientY < H / 2) {
    triggerMotion('TapHead');
  } else {
    triggerMotion('TapBody');
  }
});

window.addEventListener('load', () => setTimeout(load, 300));
</script>
</body>
</html>
