<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Huohuo — Asisten Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #4dd9c0;
    --teal2: #2ab5a0;
    --bg: #0f1520;
    --surface: #161f2e;
    --text: #e8f0fe;
    --text-soft: #7a8fa6;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'Quicksand', sans-serif; overflow: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(77,217,192,0.07) 0%, transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(77,217,192,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* CANVAS */
  #canvas {
    position: fixed;
    left: 50%; transform: translateX(-50%);
    bottom: 48%;
    z-index: 5;
    pointer-events: none;
  }

  /* SPEECH BUBBLE */
  #speech-bubble {
    position: fixed;
    z-index: 20;
    background: white;
    border: 2px solid var(--teal);
    border-radius: 16px;
    padding: 10px 14px;
    font-size: 13px;
    color: #1a2a3a;
    max-width: 200px;
    line-height: 1.5;
    box-shadow: 0 4px 20px rgba(77,217,192,0.25);
    pointer-events: none;
    opacity: 0;
    transform: scale(0.8) translateY(8px);
    transition: opacity 0.2s, transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
    word-break: break-word;
  }
  #speech-bubble.visible { opacity: 1; transform: scale(1) translateY(0); }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 20px;
    border: 5px solid transparent;
    border-top-color: var(--teal);
  }
  #speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -7px; left: 21px;
    border: 4px solid transparent;
    border-top-color: white;
    z-index: 1;
  }

  /* CHAT PANEL */
  #chat-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    z-index: 10;
    overflow: hidden;
  }

  #chat-handle {
    display: flex; align-items: center; justify-content: center;
    padding: 10px 0 4px; flex-shrink: 0;
  }
  #chat-handle::before {
    content: ''; width: 36px; height: 4px;
    background: #2a3a4a; border-radius: 99px;
  }

  #chat-header {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 18px 10px; flex-shrink: 0;
    border-bottom: 1px solid #1e2d3d;
  }
  #chat-header .dot {
    width: 8px; height: 8px; background: var(--teal);
    border-radius: 50%; animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  #chat-header span { font-size: 13px; color: var(--text-soft); font-weight: 600; }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 12px 14px; display: flex;
    flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 99px; }

  .bubble {
    max-width: 82%; padding: 10px 14px;
    border-radius: 18px; font-size: 13.5px;
    line-height: 1.55;
    animation: pop-in 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--teal2), var(--teal));
    color: #0f1a14;
    border-bottom-right-radius: 5px;
    font-weight: 600;
  }
  .bubble.ai {
    align-self: flex-start;
    background: #1e2d3d;
    color: var(--text);
    border-bottom-left-radius: 5px;
  }
  .bubble.typing span {
    display: inline-block; width: 7px; height: 7px;
    background: var(--teal); border-radius: 50%; margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
  .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-7px); }
  }

  #input-area {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px 20px; flex-shrink: 0;
    border-top: 1px solid #1e2d3d;
  }
  #msg-input {
    flex: 1; border: none;
    background: #1a2535;
    border-radius: 99px;
    padding: 11px 18px;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px; color: var(--text);
    outline: none; transition: box-shadow 0.2s;
  }
  #msg-input:focus { box-shadow: 0 0 0 2px var(--teal); }
  #msg-input::placeholder { color: #3a4a5a; }

  #send-btn {
    width: 42px; height: 42px; border: none;
    background: linear-gradient(135deg, var(--teal2), var(--teal));
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px rgba(77,217,192,0.35);
    transition: transform 0.15s; flex-shrink: 0;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn svg { width: 18px; height: 18px; fill: #0f1a14; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #1e2d3d;
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--text-soft); font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Memuat Huohuo... 🌿</p>
</div>

<div id="speech-bubble"></div>
<canvas id="canvas"></canvas>

<div id="chat-panel">
  <div id="chat-handle"></div>
  <div id="chat-header">
    <div class="dot"></div>
    <span>Huohuo sedang online</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Ketik pesan ke Huohuo..." maxlength="300" autocomplete="off"/>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 12L22 2 12 22 10 14 2 12Z"/></svg>
    </button>
  </div>
</div>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const MODEL_URL = 'https://oukaxy2.github.io/hana-v2/huohuo.model3.json';

// ── GANTI DENGAN API KEY KAMU ──
const CLAUDE_API_KEY = 'sk-ant-GANTI_DENGAN_API_KEY_KAMU';

const loadingEl  = document.getElementById('loading');
const bubble     = document.getElementById('speech-bubble');
const messagesEl = document.getElementById('messages');
const input      = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const canvasEl   = document.getElementById('canvas');

const W = window.innerWidth;
const CHAR_W = Math.min(W, 380);
const CHAR_H = Math.round(CHAR_W * 1.4);

const app = new PIXI.Application({
  view: canvasEl,
  width: CHAR_W, height: CHAR_H,
  transparent: true, backgroundAlpha: 0,
  antialias: true, autoDensity: true,
  resolution: window.devicePixelRatio || 1,
});
canvasEl.style.width  = CHAR_W + 'px';
canvasEl.style.height = CHAR_H + 'px';

let model = null;
let isPlaying = false;
let bubbleTimer = null;

// ── SPEECH BUBBLE ──
function showBubble(text, ms = 4000) {
  bubble.textContent = text;
  const rect = canvasEl.getBoundingClientRect();
  bubble.style.left = (rect.left + 10) + 'px';
  bubble.style.top  = (rect.top + 20) + 'px';
  bubble.classList.add('visible');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), ms);
}

// ── MOTION ──
async function playMotion(name) {
  if (!model || isPlaying) return;
  isPlaying = true;
  try { await model.motion(name); } catch(e) {}
  setTimeout(() => {
    isPlaying = false;
    try { model.motion('Idle'); } catch(e) {}
  }, 3500);
}

// ── CHAT ──
function addBubble(text, role) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function addTyping() {
  const div = document.createElement('div');
  div.className = 'bubble ai typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

// ── CLAUDE API ──
const SYSTEM = `Kamu adalah Huohuo, karakter dari Honkai Star Rail — seorang dukun muda yang canggung, mudah panik, tapi sangat tulus dan perhatian.
Kamu berbicara dalam Bahasa Indonesia dengan gaya yang sedikit gugup tapi hangat.
Jawaban singkat maksimal 3 kalimat. Sesekali pakai emoji tapi tidak berlebihan.
Kalau ditanya sesuatu yang susah, kamu sedikit panik tapi tetap berusaha menjawab.`;

const history = [];

// detect emotion from reply
function detectEmotion(text) {
  const t = text.toLowerCase();
  if (t.includes('maaf') || t.includes('sedih') || t.includes('nangis')) return 'cry';
  if (t.includes('marah') || t.includes('kesal') || t.includes('!!!')) return 'angry';
  if (t.includes('kaget') || t.includes('hah') || t.includes('??')) return 'baozhen';
  if (t.includes('senang') || t.includes('hehe') || t.includes('yay')) return 'qizi1';
  return null;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  addBubble(text, 'user');
  history.push({ role: 'user', content: text });

  showBubble('Eh, s-sebentar ya... 🌿', 99999);
  playMotion('TapHead');
  const typing = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CLAUDE_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'E-eh, aku tidak tahu harus bilang apa... 😅';

    typing.remove();
    addBubble(reply, 'ai');
    history.push({ role: 'assistant', content: reply });

    const short = reply.length > 65 ? reply.slice(0, 63) + '…' : reply;
    showBubble(short, 5000);

    // emotion-based motion
    const emotion = detectEmotion(reply);
    if (emotion) {
      try { model?.expression(emotion); } catch(e) {}
    }
    setTimeout(() => playMotion('TapBody'), 300);

  } catch(err) {
    typing.remove();
    const msg = 'Aduh, koneksinya putus... 😢';
    addBubble(msg, 'ai');
    showBubble(msg, 3000);
  }

  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

// ── LOAD MODEL ──
async function loadModel() {
  try {
    const Live2DModel = PIXI.live2d.Live2DModel;
    model = await Live2DModel.from(MODEL_URL);
    app.stage.addChild(model);

    const scale = Math.min(CHAR_W / model.width, CHAR_H / model.height) * 0.92;
    model.scale.set(scale);
    model.x = (CHAR_W - model.width) / 2;
    model.y = (CHAR_H - model.height) / 2;

    loadingEl.style.display = 'none';
    model.motion('Idle');

    // greeting
    setTimeout(() => {
      const greet = 'Eh! K-kamu datang! Aku senang sekali... mungkin. 🌿';
      addBubble(greet, 'ai');
      history.push({ role: 'assistant', content: greet });
      showBubble(greet, 5000);
    }, 600);

  } catch(e) {
    loadingEl.querySelector('p').textContent = '❌ Gagal load: ' + e.message;
    console.error(e);
  }
}

window.addEventListener('load', () => setTimeout(loadModel, 300));
</script>
</body>
</html>
