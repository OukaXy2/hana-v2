<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Huohuo — Asisten Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4dd9c0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #4dd9c0;
    --teal2: #2ab5a0;
    --bg: #0f1520;
    --surface: #161f2e;
    --text: #e8f0fe;
    --text-soft: #7a8fa6;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'Quicksand', sans-serif; overflow: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(77,217,192,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 40%, rgba(120,80,255,0.13) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 60%, rgba(77,217,192,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(30,60,120,0.25) 0%, transparent 60%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 20%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 5%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 38%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 42%, rgba(77,217,192,0.6) 0%, transparent 100%);
    pointer-events: none;
  }

  #canvas {
    position: fixed;
    left: 50%; transform: translateX(-50%);
    bottom: 48%;
    z-index: 5;
    pointer-events: none;
    max-width: 100vw;
  }

  #speech-bubble {
    position: fixed;
    z-index: 20;
    background: rgba(15, 25, 40, 0.92);
    border: 1.5px solid var(--teal);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    color: #e8f8f5;
    line-height: 1.4;
    box-shadow: 0 4px 24px rgba(77,217,192,0.2);
    pointer-events: none;
    opacity: 0;
    bottom: calc(48% + 6px);
    left: 50%;
    transform: translateX(-50%) scale(0.8) translateY(8px);
    transition: opacity 0.25s, transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
    word-break: break-word;
    text-align: center;
    max-width: 70vw;
  }
  #speech-bubble.visible { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--teal);
  }
  #speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -7px; left: 50%; transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: rgba(15,25,40,0.92);
    z-index: 1;
  }

  #chat-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    z-index: 10;
    overflow: hidden;
  }

  #chat-handle {
    display: flex; align-items: center; justify-content: center;
    padding: 10px 0 4px; flex-shrink: 0;
  }
  #chat-handle::before {
    content: ''; width: 36px; height: 4px;
    background: #2a3a4a; border-radius: 99px;
  }

  #chat-header {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 18px 10px; flex-shrink: 0;
    border-bottom: 1px solid #1e2d3d;
  }
  #chat-header .dot {
    width: 8px; height: 8px; background: var(--teal);
    border-radius: 50%; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #chat-header span { font-size: 13px; color: var(--text-soft); font-weight: 600; flex: 1; }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 12px 14px; display: flex;
    flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 99px; }

  .bubble {
    max-width: 82%; padding: 10px 14px;
    border-radius: 18px; font-size: 13.5px;
    line-height: 1.55;
    animation: pop-in 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--teal2), var(--teal));
    color: #0f1a14;
    border-bottom-right-radius: 5px;
    font-weight: 600;
  }
  .bubble.ai {
    align-self: flex-start;
    background: #1e2d3d;
    color: var(--text);
    border-bottom-left-radius: 5px;
  }
  .bubble.typing span {
    display: inline-block; width: 7px; height: 7px;
    background: var(--teal); border-radius: 50%; margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
  .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-7px); }
  }

  #input-area {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px 20px; flex-shrink: 0;
    border-top: 1px solid #1e2d3d;
  }
  #msg-input {
    flex: 1; border: none;
    background: #1a2535;
    border-radius: 99px;
    padding: 11px 18px;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px; color: var(--text);
    outline: none; transition: box-shadow 0.2s;
  }
  #msg-input:focus { box-shadow: 0 0 0 2px var(--teal); }
  #msg-input::placeholder { color: #3a4a5a; }

  #send-btn {
    width: 42px; height: 42px; border: none;
    background: linear-gradient(135deg, var(--teal2), var(--teal));
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px rgba(77,217,192,0.35);
    transition: transform 0.15s; flex-shrink: 0;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn svg { width: 18px; height: 18px; fill: #0f1a14; }

  #loading {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #1e2d3d;
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--text-soft); font-size: 14px; font-weight: 600; }

  #tts-btn {
    width: 30px; height: 30px; border: none;
    background: transparent;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.2s;
    opacity: 0.5;
    flex-shrink: 0;
  }
  #tts-btn.active { opacity: 1; }
  #tts-btn:active { transform: scale(0.88); }
  #tts-btn svg { width: 18px; height: 18px; }

  #tts-speaking-ring {
    position: fixed;
    bottom: calc(48% + 10px);
    left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--teal);
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    transition: opacity 0.3s;
  }
  #tts-speaking-ring.speaking {
    opacity: 0.6;
    animation: ring-pulse 1s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
    50% { transform: translateX(-50%) scale(1.18); opacity: 0.2; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Memuat Huohuo... 🌿</p>
</div>

<div id="tts-speaking-ring"></div>
<div id="speech-bubble"></div>
<canvas id="canvas"></canvas>

<div id="chat-panel">
  <div id="chat-handle"></div>
  <div id="chat-header">
    <div class="dot"></div>
    <span>Huohuo sedang online</span>
    <button id="tts-btn" title="Toggle suara Huohuo" aria-label="Toggle TTS">
      <svg id="tts-icon-on" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <svg id="tts-icon-off" viewBox="0 0 24 24" fill="none" stroke="#7a8fa6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Ketik pesan ke Huohuo..." maxlength="300" autocomplete="off"/>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 12L22 2 12 22 10 14 2 12Z"/></svg>
    </button>
  </div>
</div>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@5.3.12/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const MODEL_URL = 'https://oukaxy2.github.io/hana-v2/huohuo.model3.json';
const WORKER_URL = 'https://huohuo-assist.mywisnu238.workers.dev';

const loadingEl  = document.getElementById('loading');
const bubble     = document.getElementById('speech-bubble');
const messagesEl = document.getElementById('messages');
const input      = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const canvasEl   = document.getElementById('canvas');

const W = window.innerWidth;
const H = window.innerHeight;
const availH = Math.round(H * 0.50);
const CHAR_H = availH;
const CHAR_W = Math.round(CHAR_H / 1.4);

const app = new PIXI.Application({
  view: canvasEl,
  width: CHAR_W, height: CHAR_H,
  transparent: true, backgroundAlpha: 0,
  antialias: true, autoDensity: true,
  resolution: window.devicePixelRatio || 1,
});
canvasEl.style.width  = CHAR_W + 'px';
canvasEl.style.height = CHAR_H + 'px';

let model = null;
let isPlaying = false;
let bubbleTimer = null;

function showBubble(text, ms = 4000) {
  bubble.textContent = text;
  bubble.classList.add('visible');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), ms);
}

async function playMotion(name, idx = 0) {
  if (!model || isPlaying) return;
  isPlaying = true;
  try { await model.motion(name, idx); } catch(e) {}
  setTimeout(() => {
    isPlaying = false;
    try { model.motion('Idle'); } catch(e) {}
  }, 3500);
}

// Auto rotate idle tiap 8 detik
const idleMotions = [
  { name: 'Idle' },
  { name: 'TapBody' },
  { name: 'Special', idx: 0 },
  { name: 'Special', idx: 3 },
];
let idleIdx = 0;
setInterval(() => {
  if (!isPlaying && model) {
    const m = idleMotions[idleIdx % idleMotions.length];
    try { model.motion(m.name, m.idx || 0); } catch(e) {}
    idleIdx++;
  }
}, 8000);

function addBubble(text, role) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function addTyping() {
  const div = document.createElement('div');
  div.className = 'bubble ai typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function detectEmotion(text) {
  const t = text.toLowerCase();
  if (t.includes('maaf') || t.includes('sedih') || t.includes('nangis')) return 'cry';
  if (t.includes('marah') || t.includes('kesal')) return 'angry';
  if (t.includes('kaget') || t.includes('hah')) return 'baozhen';
  if (t.includes('senang') || t.includes('hehe') || t.includes('yay')) return 'qizi1';
  return null;
}

function detectUserMotion(text) {
  const t = text.toLowerCase();
  if (/\b(joget|dance|nari|goyang dong|joget dong)\b/.test(t)) return 'Special:3';
  if (/\b(tidur dong|bobo dong|pura-pura tidur|ngantuk dong)\b/.test(t)) return 'Special:2';
  if (/\b(semangat dong|lompat dong)\b/.test(t)) return 'Special:0';
  if (/\b(geleng|menggeleng|goyang kepala)\b/.test(t)) return 'TapHead';
  if (/\b(melambai|lambaikan tangan)\b/.test(t)) return 'TapBody';
  if (/\b(\*panik\*|\*takut\*|\*gemetar\*)\b/.test(t)) return 'Special:1';
  return null;
}

// ─── Text-to-Speech ───────────────────────────────────────────
const ttsBtn       = document.getElementById('tts-btn');
const ttsIconOn    = document.getElementById('tts-icon-on');
const ttsIconOff   = document.getElementById('tts-icon-off');
const ttsSpeakRing = document.getElementById('tts-speaking-ring');

let ttsEnabled = true;
let ttsUtterance = null;

// Simpan preferensi ke localStorage
try { ttsEnabled = localStorage.getItem('huohuo_tts') !== 'false'; } catch(e) {}

function updateTtsUI() {
  ttsBtn.classList.toggle('active', ttsEnabled);
  ttsIconOn.style.display  = ttsEnabled ? '' : 'none';
  ttsIconOff.style.display = ttsEnabled ? 'none' : '';
}
updateTtsUI();

ttsBtn.addEventListener('click', () => {
  ttsEnabled = !ttsEnabled;
  try { localStorage.setItem('huohuo_tts', ttsEnabled); } catch(e) {}
  if (!ttsEnabled) stopTTS();
  updateTtsUI();
});

function stopTTS() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  ttsSpeakRing.classList.remove('speaking');
}

function speakText(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  stopTTS();

  // Bersihkan teks dari emoji dan karakter khusus
  const clean = text.replace(/[\u{1F300}-\u{1FFFF}]/gu, '')
                    .replace(/[*_~`#]/g, '')
                    .trim();
  if (!clean) return;

  ttsUtterance = new SpeechSynthesisUtterance(clean);
  ttsUtterance.lang  = 'id-ID';
  ttsUtterance.rate  = 0.92;
  ttsUtterance.pitch = 1.35;
  ttsUtterance.volume = 1;

  // Pilih suara perempuan jika tersedia
  const voices = window.speechSynthesis.getVoices();
  const femVoice = voices.find(v =>
    v.lang.startsWith('id') && /female|woman|perempuan/i.test(v.name)
  ) || voices.find(v => v.lang.startsWith('id'))
    || voices.find(v => v.lang.startsWith('en') && /female|woman/i.test(v.name));
  if (femVoice) ttsUtterance.voice = femVoice;

  ttsUtterance.onstart = () => ttsSpeakRing.classList.add('speaking');
  ttsUtterance.onend   = () => ttsSpeakRing.classList.remove('speaking');
  ttsUtterance.onerror = () => ttsSpeakRing.classList.remove('speaking');

  window.speechSynthesis.speak(ttsUtterance);
}

// Pastikan voices sudah dimuat
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
}
// ──────────────────────────────────────────────────────────────



async function sendMessage(text) {
  if (!text.trim()) return;
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  addBubble(text, 'user');
  history.push({ role: 'user', content: text });

  showBubble('Eh, s-sebentar ya... 🌿', 99999);
  const typing = addTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'E-eh, aku tidak tahu harus bilang apa... 😅';

    typing.remove();
    addBubble(reply, 'ai');
    history.push({ role: 'assistant', content: reply });

    const short = reply.length > 65 ? reply.slice(0, 63) + '…' : reply;
    showBubble(short, 5000);
    speakText(reply);

    const emotion = detectEmotion(reply);
    if (emotion) { try { model?.expression(emotion); } catch(e) {} }

    const userMotion = detectUserMotion(text) || detectUserMotion(reply);
    if (userMotion) {
      const parts = userMotion.split(':');
      setTimeout(() => {
        try {
          model?.motion(parts[0], parseInt(parts[1]) || 0);
        } catch(e) {}
      }, 300);
    } else {
      setTimeout(() => playMotion('TapBody'), 300);
    }

  } catch(err) {
    typing.remove();
    const msg = 'Aduh, koneksinya putus... 😢';
    addBubble(msg, 'ai');
    showBubble(msg, 3000);
  }

  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

async function loadModel() {
  try {
    const Live2DModel = PIXI.live2d.Live2DModel;
    model = await Live2DModel.from(MODEL_URL);
    app.stage.addChild(model);

    const scale = Math.min(CHAR_W / model.width, CHAR_H / model.height) * 0.92;
    model.scale.set(scale);
    model.x = (CHAR_W - model.width) / 2;
    model.y = (CHAR_H - model.height) / 2;

    loadingEl.style.display = 'none';
    model.motion('Idle');

    setTimeout(() => {
      const greet = 'Eh! K-kamu datang! Aku senang sekali... mungkin. 🌿';
      addBubble(greet, 'ai');
      history.push({ role: 'assistant', content: greet });
      showBubble(greet, 5000);
      speakText(greet);
    }, 600);

  } catch(e) {
    loadingEl.querySelector('p').textContent = '❌ Gagal load: ' + e.message;
    console.error(e);
  }
}

window.addEventListener('load', () => setTimeout(loadModel, 300));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
